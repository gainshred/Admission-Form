<body>

  <div class="container">

    <div class="logo-wrap">
      <img class="logo" src="gainshred-logo.jpg" alt="Gainshred Logo">
    </div>

    <h1>Admission Form</h1>
    <p class="subtitle">
      Opening Soon | Gain Strength. Shred Limits.
    </p>

    <form id="gainshredForm">

      <div class="field">
        <label for="name">Full Name</label>
        <input
          id="name"
          type="text"
          placeholder="Enter your full name"
          required>
      </div>

      <div class="field">
        <label for="phone">Contact Number</label>
        <input
          id="phone"
          type="tel"
          placeholder="Enter your contact number"
          required>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          placeholder="Enter your email address"
          required>
      </div>

      <div class="field">
        <label for="photo">Upload Photo</label>
        <input
          id="photo"
          type="file"
          accept="image/*"
          required>

        <div class="help">
          Please upload a clear front-facing photo.
        </div>
      </div>

      <button type="submit">
        Submit Admission Form
      </button>

    </form>

    <div class="footer">
      Gainshred Fitness Club
    </div>

  </div>

  <script>
    const form =
      document.getElementById("gainshredForm");

    form.addEventListener(
      "submit",
      function(event) {

        event.preventDefault();

        const file =
          document.getElementById("photo")
          .files[0];

        if (!file) {
          alert("Please upload your photo.");
          return;
        }

        const reader =
          new FileReader();

        reader.onload =
          function(e) {

            const formData = {

              fullName:
                document.getElementById("name").value,

              contactNumber:
                document.getElementById("phone").value,

              email:
                document.getElementById("email").value,

              photo: {
                fileName: file.name,
                mimeType: file.type,
                data:
                  e.target.result.split(",")[1]
              }
            };

            google.script.run
              .withSuccessHandler(
                function(response) {

                  alert(response.message);

                  form.reset();
                }
              )
              .submitAdmission(formData);
          };

        reader.readAsDataURL(file);
      }
    );
  </script>

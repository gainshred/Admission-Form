<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gainshred Admission Form</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,0.20), transparent 32%),
        radial-gradient(circle at bottom right, rgba(15,23,42,0.95), transparent 40%),
        linear-gradient(135deg, #05070b 0%, #111827 50%, #030712 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      color: #ffffff;
    }

    .container {
      width: 100%;
      max-width: 560px;
      background: rgba(8,12,19,0.96);
      border: 1px solid rgba(96,165,250,0.35);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.58);
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 18px;
    }

    .logo {
      width: 250px;
      max-width: 88%;
      height: auto;
      border-radius: 14px;
    }

    h1 {
      margin: 0;
      text-align: center;
      font-size: 34px;
      color: #dbeafe;
      text-transform: uppercase;
    }

    .subtitle {
      margin: 10px 0 28px;
      text-align: center;
      color: #cbd5e1;
      line-height: 1.5;
      font-size: 15px;
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 700;
      color: #f8fafc;
    }

    input {
      width: 100%;
      padding: 14px 15px;
      border-radius: 13px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #ffffff;
      font-size: 15px;
      outline: none;
    }

select {
  width: 100%;
  padding: 14px 15px;
  border-radius: 13px;
  border: 1px solid #334155;
  background: #0f172a;
  color: #ffffff;
  font-size: 15px;
  outline: none;
}

select:focus {
  border-color: #60a5fa;
  box-shadow: 0 0 0 3px rgba(96,165,250,0.16);
}

    input:focus {
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96,165,250,0.16);
    }

    input::placeholder {
      color: #94a3b8;
    }

    .help {
      margin-top: 6px;
      font-size: 12px;
      color: #94a3b8;
    }

    button {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #93c5fd, #2563eb);
      color: #ffffff;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover {
      opacity: 0.94;
    }

    .footer {
      margin-top: 22px;
      text-align: center;
      color: #94a3b8;
      font-size: 12px;
    }

    @media (max-width: 520px) {
      .container {
        padding: 24px 18px;
      }

      .logo {
        width: 220px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="logo-wrap">
      <img class="logo" src="gainshred-logo.jpg" alt="Gainshred Logo">
    </div>

    <h1>Admission Form</h1>
    <p class="subtitle">
      Opening Soon | Gain Strength. Shred Limits.
    </p>

    <form id="gainshredForm">

      <div class="field">
        <label for="name">Full Name</label>
        <input
          id="name"
          type="text"
          placeholder="Enter your full name"
          required>
      </div>

      <div class="field">
        <label for="phone">Contact Number</label>
        <input
          id="phone"
          type="tel"
          placeholder="Enter your contact number"
          required>
      </div>

      <div class="field">
        <label for="email">Email Address</label>
        <input
          id="email"
          type="email"
          placeholder="Enter your email address"
          required>
      </div>

<div class="field">
  <label for="package">
    Membership Package
  </label>

  <select
    id="package"
    required>

    <option value="">
      Select Package
    </option>

    <option value="Monthly">
      Monthly
    </option>

    <option value="Quarterly">
      Quarterly
    </option>

    <option value="Half Yearly">
      Half Yearly
    </option>

    <option value="Yearly">
      Yearly
    </option>

  </select>
</div>


      <div class="field">
        <label for="photo">Upload Photo</label>
        <input
          id="photo"
          type="file"
          accept="image/*"
          required>

        <div class="help">
          Please upload a clear front-facing photo.
        </div>
      </div>

      <button type="submit">
        Submit Admission Form
      </button>

    </form>

    <div class="footer">
      Gainshred Fitness Club
    </div>

  </div>
<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwBGoN-HQDlHTkeUBq1lRYqaEStJyfEiElTX-3maxmiqq7wVPIBFYCir4onkT1wO6OHaw/exec";

const form = document.getElementById("gainshredForm");

form.addEventListener("submit", function(event) {
  event.preventDefault();

  const file = document.getElementById("photo").files[0];

  if (!file) {
    alert("Please upload your photo.");
    return;
  }

  const reader = new FileReader();

  reader.onload = async function(e) {
    const formData = new FormData();

    formData.append("fullName", document.getElementById("name").value);
    formData.append("contactNumber", document.getElementById("phone").value);
    formData.append("email", document.getElementById("email").value);
    formData.append("membershipPackage", document.getElementById("package").value);
    formData.append("photoFileName", file.name);
    formData.append("photoMimeType", file.type);
    formData.append("photoData", e.target.result.split(",")[1]);

    try {
      await fetch(scriptURL, {
        method: "POST",
        mode: "no-cors",
        body: formData
      });

      alert("Thank you for choosing GainShred as your fitness partner. Your registration has been submitted successfully.");

      form.reset();

    } catch (error) {
      alert("Submission failed. Please try again.");
      console.log(error);
    }
  };

  reader.readAsDataURL(file);
});
</script>


</body>
</html>
